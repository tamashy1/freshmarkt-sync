spring:
  application:
    name: freshmarkt-sync
  datasource:
    url: jdbc:h2:mem:freshmarkt-sync
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC


freshmarkt:
  api:
    base-url: https://api.freshmarkt.fake/v1
    key: api-key-here
  sync:
    cron: 0 */15 * * * *

